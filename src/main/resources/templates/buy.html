<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org/">
<head>
    <title>Buy Book</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Buy Book</h2>
    <div th:if="${book != null}">
        <h4 th:text="${book.title}">Title</h4>
        <p th:text="'Author: ' + ${book.author}">Author</p>
        <p th:text="'Price: $' + ${book.price}">Price</p>
        <p th:text="'Available Quantity: ' + ${book.quantity}">Quantity</p>
		<form th:action="@{/buy/{id}(id=${book.id})}" method="post">
            <div class="form-group">
                <label for="quantity">Quantity to Buy:</label>
                <input type="number" id="quantity" name="quantity" min="1" th:max="${book.quantity}" class="form-control" required="required"/>"
            </div>
            <button type="submit" class="btn btn-primary" th:disabled="${book.quantity == 0}">Buy</button>
        </form>
	<div th:if="${message}">
    	<p th:text="${message}" class="mt-3 text-info"></p>
	</div>
	<div th:if="${book.quantity == 0}">
    	<p class="text-danger">Out of Stock!</p>
	</div>
</div>
</div>
<div class="position-absolute bottom-0 right-0  m-2 ">
<li><a href="/user" class="text-blue fw-bold">Go To Home Page</a></li>
<li><a href="/usermenu" class="text-blue fw-bold">Back</a></li>
</div>
</body>
</html>
