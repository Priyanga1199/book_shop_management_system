<!DOCTYPE html>
 <html xmlns:th="https://www.thymeleaf.org/">
  <head> 
  <meta charset="UTF-8"> 
  <title>Login - BookManagementSystem</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head> 
    <body class="bg-light"> 
    <div class="container mt-5">
      <h2 class="text-center mb-4">User Login</h2>
      <div class="card p-4 shadow" style="width: 400px; margin: auto;">
        <form method="post" th:action="@{/login}" th:object="${login}">
         <div class="mb-3"> 
         	<label>Username</label>
         	<input type="text" th:field="*{username}" class="form-control" required>
         </div> 
         <div class="mb-3"> 
          	<label>Password</label>
            <input type="password" th:field="*{password}" class="form-control" required>
         </div> 
          <div class="mb-3"> 
          	<label>Role</label>
            <input type="role" th:field="*{role}" class="form-control" required>
         </div> 
         <p class="text-danger" th:text="${msg}"></p>
         <button class="btn btn-primary w-100">Login</button> 
       </form>
    </div>
  </div>
</body> 
</html>
