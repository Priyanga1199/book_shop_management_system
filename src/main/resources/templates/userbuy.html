<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org/">
<head>
<meta charset="UTF-8">
<title>Registered Book Logs</title>
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.mi
n.css" rel="stylesheet"
integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuI
AvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div align="right">
<a href="/logout">
 <button class="btn btn-primary w-100">Logout</button>
</a>
&nbsp;&nbsp;

</div>
<div class="container mt-5">
 <h2 class="text-center mb-4">Registered Book List</h2>
<div class="card p-4 shadow" style="width: 1000px; margin: auto;">
<table border="1" rules="all" width="100%">
<tr>
<th>IBSN</th>
<th>BOOK TITLE</th>
<th>BOOK AUTHOR</th>
<th>PRICE</th>
<th>QUANTITY</th>

<th colspan="2">ACTIONS</th>
</tr>
<tr th:each="s:${list}">
<td th:text="${s.id}"></td>
<td th:text="${s.title}"></td>
<td th:text="${s.author}"></td>
<td th:text="${s.price}"></td>
<td th:text="${s.quantity}"></td>

<td><a th:href="@{/buy/{id}(id=${s.id})}">Buy Book</a></td>

</tr>
</table>
</div>
</div>
<div class="position-absolute bottom-0 right-0  m-2 ">
<li><a href="/user" class="text-blue fw-bold">Go To Home Page</a></li>
<li><a href="/usermenu" class="text-blue fw-bold">Back</a></li>
</div>

</body>
</html>
